    trainer_name: "Giovanni, Líder del Team Rocket"
    battle_dialogue: "¿Así que tú eres quien ha derrotado a todos mis hombres? ¡Prepárate para conocer el verdadero poder!"
    defeat_dialogue: "...Eres poderoso. Pero el Team Rocket no ha terminado. Esto no acabará aquí."
